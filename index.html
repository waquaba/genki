<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>空港分室</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Shippori+Mincho:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        /* 全体のリセットと背景（清潔で眩しい空港のイメージ） */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Shippori Mincho', serif;
            background-color: #dceaf5; /* 眩しく清潔なライトブルー */
            /* 擬似的に空港のパースや光を表現するグラデーション */
            background: radial-gradient(circle at 50% 30%, #ffffff 0%, #edf5fa 50%, #c5daf0 100%);
            background-attachment: fixed;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* ----------------------------------
         * 天井から吊り下げられた3つのタブ（ずらさず横並び）
         * ---------------------------------- */
        .ceiling-nav {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 40px; /* タブ同士の間隔 */
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            cursor: pointer;
        }

        /* 吊り下げている細いワイヤー */
        .nav-item::before {
            content: "";
            width: 1px;
            height: 60px; /* ワイヤーの長さ */
            background: linear-gradient(to bottom, #7a94a8, #b0c7d8);
        }

        /* 看板（タブ）本体：半透明で光を透過するアクリル風 */
        .nav-box {
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 15px 35px rgba(180, 200, 215, 0.4), 
                        inset 0 0 15px rgba(255, 255, 255, 0.6);
            padding: 25px 15px;
            width: 45px; /* 縦長の看板 */
            text-align: center;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        /* 看板の中の美しい縦書き日本語 */
        .nav-box span {
            writing-mode: vertical-rl;
            text-combine-upright: digits 2;
            font-size: 1.3
