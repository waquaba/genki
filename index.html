<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>空港分室</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Shippori+Mincho:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        /* 全体の設定と、アップロードした画像を背景に指定 */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Shippori Mincho', serif;
            /* 先ほどアップロードした画像を背景に設定 */
            background-image: url('background.png'); 
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed; /* スクロールしても背景を固定 */
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* ----------------------------------
         * 天井から吊り下げられた3つのタブ（横並び）
         * ---------------------------------- */
        .ceiling-nav {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 40px; 
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            cursor: pointer;
        }

        /* 吊り下げワイヤー */
        .nav-item::before {
            content: "";
            width: 1px;
            height: 60px; 
            background: linear-gradient(to bottom, rgba(255,255,255,0.4), rgba(255,255,255,0.8));
        }

        /* 磨りガラス・透けたアクリル風のデザイン（グラスモフィズム） */
        .nav-box {
            background: rgba(255, 255, 255, 0.15); /* 背後が透ける薄い白 */
            border: 1px solid rgba(255, 255, 255, 0.4); /* ガラスのエッジを表現 */
            border-top: 2px solid rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px); /* 背景を綺麗にぼかす、ガラスの肝となる設定 */
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05), 
                        inset 0 0 15px rgba(255, 255, 255, 0.2);
            padding: 25px 15px;
            width: 45px; 
            text-align: center;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* 看板の中の美しい縦書き日本語 */
        .nav-box span {
            writing-mode: vertical-rl;
            text-combine-upright: digits 2;
            font-size: 1.3rem;
            font-weight: 700;
            color: #0d1b2a; /* 視認性の高い、少し深い紺黒 */
            letter-spacing: 0.3em;
            text-shadow: 0 1px 2px rgba(255, 255, 255, 0.6);
        }

        /* ホバー時にガラスの透明度と質感が変わる */
        .nav-item:hover .nav-box {
            background: rgba(255, 255, 255, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.6);
            transform: translateY(4px); 
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
        }


        /* ----------------------------------
         * 右下：ベタ青・テプラ風お問い合わせ
         * ---------------------------------- */
        .tepra-contact {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #0000ff; 
            border: 2px solid #0000ff;
            box-shadow: 2px 2px 0px #000; 
            padding: 12px 18px;
            text-decoration: none;
            z-index: 100;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .tepra-contact span {
            font-family: 'DotGothic16', sans-serif;
            color: #ffffff;
            font-size: 1.1rem;
            letter-spacing: 0.1em;
            font-weight: bold;
        }

        .tepra-contact:hover {
            transform: translate(-1px, -1px);
            box-shadow: 3px 3px 0px #000;
        }

        .tepra-contact:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px #000;
        }


        /* ----------------------------------
         * 中央：コンテンツ表示エリア（こちらも薄いガラス風に）
         * ---------------------------------- */
        .main-container {
            max-width: 650px;
            margin: 0 auto;
            padding-top: 260px; 
            padding-bottom: 100px;
        }

        section {
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 40px;
            margin-bottom: 40px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            display: none; 
        }

        section:target, section.active {
            display: block;
            animation: fadeIn 0.6s ease both;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            font-size: 1.4rem;
            color: #0d1b2a;
            border-bottom: 1px solid #0d1b2a;
            padding-bottom: 10px;
            margin-top: 0;
            letter-spacing: 0.15em;
        }

        p {
            color: #1c2d3d;
            line-height: 2;
            font-size: 0.95rem;
        }

        ul { list-style: none; padding: 0; }
        li { margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px dashed rgba(13,27,42,0.2); }
        a { color: #0000ff; text-decoration: none; }
        a:hover { text-decoration: underline; }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9rem; }
        input, textarea {
            width: 100%; padding: 10px; border: 1px solid rgba(13,27,42,0.3); 
            background: rgba(255,255,255,0.6); font-family: inherit; box-sizing: border-box;
        }
        .submit-btn {
            background: #0000ff; color: white; border: none; padding: 10px 20px; 
            font-family: 'DotGothic16', sans-serif; cursor: pointer; letter-spacing: 0.1em;
            box-shadow: 2px 2px 0px #000;
        }
        .submit-btn:hover { transform: translate(-1px, -1px); box-shadow: 3px 3px 0px #000; }
    </style>
</head>
<body>

    <nav class="ceiling-nav">
        <a class="nav-item" href="#profile" onclick="switchSection('profile')">
            <div class="nav-box"><span>自己紹介</span></div>
        </a>
        <a class="nav-item" href="#diary" onclick="switchSection('diary')">
            <div class="nav-box"><span>日記</span></div>
        </a>
        <a class="nav-item" href="#miscellany" onclick="switchSection('miscellany')">
            <div class="nav-box"><span>雑記帳</span></div>
        </a>
    </nav>

    <a class="tepra-contact" href="#contact" onclick="switchSection('contact')">
        <span>お問い合わせフォーム</span>
    </a>

    <div class="main-container">

        <section id="profile" class="active">
            <h2>自己紹介</h2>
            <p>
                ここに簡単な自己紹介を書いてください。現在の所属、関心のあるテーマ、あるいはこの静かな空間についての短いテキストを置く場所です。
            </p>
        </section>

        <section id="diary">
            <h2>日記</h2>
            <ul>
                <li>
                    <span style="font-size: 0.8rem; color: #556b7d; display: block;">2026.06.29</span>
                    <a href="#">今日の日記（仮）</a>
                    <p style="margin: 5px 0 0 0; font-size: 0.9rem; color: #2c3e50;">ここへ日記の文章が入ります。</p>
                </li>
            </ul>
        </section>

        <section id="miscellany">
            <h2>雑記帳</h2>
            <ul>
                <li><a href="#">思考の断片についてのノート</a></li>
                <li><a href="#">いつか整理するかもしれない概念</a></li>
            </ul>
        </section>

        <section id="contact">
            <h2>お問い合わせ</h2>
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="name">お名前</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">メールアドレス</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="message">メッセージ</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div>
                <button type="submit" class="submit-btn">送信</button>
            </form>
        </section>

    </div>

    <script>
        function switchSection(sectionId) {
            const sections = document.querySelectorAll('main-container section, section');
            sections.forEach(sec => {
                sec.classList.remove('active');
            });
            const activeSection = document.getElementById(sectionId);
            if (activeSection) {
                activeSection.classList.add('active');
            }
        }
        
        window.addEventListener('DOMContentLoaded', () => {
            const hash = window.location.hash.replace('#', '');
            if (hash) {
                switchSection(hash);
            }
        });
    </script>

</body>
</html>
