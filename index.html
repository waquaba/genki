<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOMABA National Airport⭐️✈️</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
            font-family: 'Shippori Mincho', serif;
        }

        body {
            background-image: url('background.png'); 
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            position: relative;
        }

        .ceiling-nav {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 40px; 
            z-index: 9999;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            cursor: pointer;
        }

        .nav-item::before {
            content: "";
            width: 1px;
            height: 20px; 
            background: linear-gradient(to bottom, rgba(255,255,255,0.4), rgba(255,255,255,0.8));
        }

        .nav-box {
            background: rgba(255, 255, 255, 0.15) !important; 
            border: 1px solid rgba(255, 255, 255, 0.4) !important; 
            border-top: 2px solid rgba(255, 255, 255, 0.6) !important;
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05), inset 0 0 15px rgba(255, 255, 255, 0.2);
            padding: 30px 18px; 
            width: 54px; 
            text-align: center;
            display: block;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .nav-box span {
            writing-mode: vertical-rl;
            text-combine-upright: digits 2;
            font-weight: 700;
            font-size: 1.4rem;
            color: #0d1b2a; 
            letter-spacing: 0.3em;
            text-shadow: 0 1px 2px rgba(255, 255, 255, 0.6);
            line-height: 1;
            display: inline-block;
        }

        .nav-item:hover .nav-box {
            background: rgba(255, 255, 255, 0.38) !important;
            border: 1px solid rgba(255, 255, 255, 0.7) !important;
            transform: translateY(6px); 
        }

        .tepra-button {
            position: fixed;
            background: #0000ff; 
            border: 2px solid #0000ff;
            box-shadow: 3px 3px 0px #000; 
            padding: 10px 20px;
            z-index: 100;
            cursor: pointer;
            transition: all 0.1s;
        }

        .tepra-button span {
            font-weight: 700;
            color: #ffffff;
            font-size: 1.1rem;
            letter-spacing: 0.1em;
            display: inline-block;
        }

        .tepra-button:hover {
            transform: translate(-1px, -1px);
            box-shadow: 4px 4px 0px #000;
        }

        .tepra-home { bottom: 35px; left: 35px; }
        
        .music-wrapper { 
            position: fixed; 
            bottom: 35px; 
            right: 35px; 
            display: flex; 
            flex-direction: column; 
            align-items: flex-end; 
            z-index: 100; 
        }
        
        .tepra-music { position: relative; }
        .music-license { font-size: 0.6rem; color: #0d1b2a; margin-top: 6px; opacity: 0; transition: opacity 0.5s ease; white-space: nowrap; text-shadow: 0 1px 0 rgba(255, 255, 255, 0.5); }
        .music-wrapper.playing .music-license { opacity: 0.7; }
        .tepra-music.playing { background: #0000cc; transform: translate(2px, 2px); box-shadow: 0px 0px 0px #000; }

        .main-container {
            position: fixed;
            top: 225px; 
            bottom: 120px; 
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 680px;
            z-index: 10;
        }

        .content-section {
            background: rgba(255, 255, 255, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            padding: 40px 50px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.04);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            
            height: 100%;
            box-sizing: border-box;
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
            
            display: none; 
            position: relative;
        }

        .content-section.active {
            display: block !important;
            animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .content-section::-webkit-scrollbar { width: 5px; }
        .content-section::-webkit-scrollbar-track { background: transparent; }
        .content-section::-webkit-scrollbar-thumb { background: rgba(0, 0, 255, 0.15); border-radius: 10px; }

        h2 {
            font-weight: 700;
            font-size: 1.5rem;
            color: #0d1b2a;
            border-bottom: 2px solid #0d1b2a;
            padding-bottom: 10px;
            margin-top: 0;
            letter-spacing: 0.15em;
        }

        p { color: #1c2d3d; line-height: 2.2; font-size: 1rem; }
        ul { list-style: none; padding: 0; }
        li { margin-bottom: 25px; }
        
        .item-list-wrapper { margin-top: 20px; }
        
        /* 階層ツリー（アコーディオン）用の共通スタイル */
        .tree-node {
            display: block;
            margin-top: 10px;
            margin-bottom: 10px;
        }

        .tree-node summary {
            color: #0000ff;
            font-weight: bold;
            cursor: pointer;
            outline: none;
            user-select: none;
            padding: 4px 8px;
            display: inline-block;
        }
        
        .tree-node summary::-webkit-details-marker { display: none; }
        
        /* フォルダ絵文字の制御 */
        .tree-node summary::before { content: "📁 "; font-size: 0.9rem; }
        .tree-node[open] > summary::before { content: "📂 "; }
        .tree-node summary:hover { text-decoration: underline; background: rgba(0, 0, 255, 0.03); }

        /* 子階層のインデント（線ガイド） */
        .tree-content {
            padding-left: 20px;
            border-left: 1px dashed rgba(0, 0, 255, 0.2);
            margin-left: 14px;
            margin-top: 5px;
            margin-bottom: 5px;
        }

        /* 最深部：クリックして開くファイルリンク */
        .clickable-link {
            color: #0000ff;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
            display: inline-block;
            margin-top: 6px;
            margin-bottom: 6px;
            padding: 2px 6px;
        }
        .clickable-link::before { content: "📄 "; }
        .clickable-link:hover { text-decoration: underline; background: rgba(0, 0, 255, 0.05); }

        .detail-view { display: none; }
        .detail-view.active { display: block; }

        .back-button {
            color: #0000ff;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            margin-bottom: 20px;
        }
        .back-button::before { content: "←"; margin-right: 5px; }
        .back-button:hover { text-decoration: underline; }

        .detail-title { font-size: 1.7rem; font-weight: 700; color: #0d1b2a; margin-bottom: 25px; }
        .detail-content-text { line-height: 2.2; color: #1c2d3d; }

        .form-group { margin-bottom: 25px; }
        label { font-weight: 700; display: block; margin-bottom: 8px; font-size: 0.85rem; color: #0d1b2a; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid rgba(13,27,42,0.2); background: rgba(255,255,255,0.7); font-family: inherit; box-sizing: border-box; }
        .submit-btn { background: #0000ff; color: white; border: none; padding: 12px 30px; font-weight: 700; cursor: pointer; letter-spacing: 0.1em; box-shadow: 3px 3px 0px #000; }
        .submit-btn:hover { transform: translate(-1px, -1px); box-shadow: 4px 4px 0px #000; }
        
        .contact-disclaimer { font-size: 0.8rem; color: #556b7d; line-height: 1.8; margin-top: 25px; border-top: 1px dashed rgba(13,27,42,0.15); padding-top: 15px; }
       /* 🆕 スマホやiPad mini（縦向き幅800px未満）を完全に弾き、通常のiPad以上は通す */
        @media (max-width: 800px) {
            body::before {
                content: "より画面の大きな媒体で閲覧をお願いします．";
                position: fixed;
                top: 0; left: 0; width: 100%; height: 100%;
                background: #f4f5f6; /* 空港の清潔な白・グレー */
                color: #0d1b2a;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 1.1rem;
                letter-spacing: 0.1em;
                padding: 30px;
                box-sizing: border-box;
                text-align: center;
                z-index: 100000;
                font-family: 'Shippori Mincho', serif;
            }
        }
    </style>
</head>
<body>

    <audio id="bgm" src="bgm.mp3" loop></audio>

    <nav class="ceiling-nav">
        <div class="nav-item" onclick="switchSection('profile')"><div class="nav-box"><span>自己紹介</span></div></div>
        <div class="nav-item" onclick="switchSection('diary')"><div class="nav-box"><span>日記</span></div></div>
        <div class="nav-item" onclick="switchSection('miscellany')"><div class="nav-box"><span>雑記帳</span></div></div>
        <div class="nav-item" onclick="switchSection('contact')"><div class="nav-box"><span>窓口</span></div></div>
    </nav>

    <div class="tepra-button tepra-home" onclick="switchSection('home')"><span>ホームに戻る</span></div>

    <div class="music-wrapper" id="musicWrapper">
        <div class="tepra-button tepra-music" id="musicBtn" onclick="toggleMusic()"><span>ミュージック</span></div>
        <div class="music-license">BGM: OtoLogic (CC BY 4.0)</div>
    </div>

    <div class="main-container">

        <section id="home" class="content-section active">
            <h2>ようこそ</h2>
            <p>
                お立ち寄りいただき、ありがとうございます。<br>
                ここは、眩しく清潔な空港の片隅に設けられた、個人的な記録のための分室です。
            </p>
        </section>

        <section id="profile" class="content-section">
            <h2>自己紹介</h2>
            <p>ここにプロフィールを記入してください。</p>
        </section>

        <section id="diary" class="content-section">
            <div id="diary-list">
                <h2>日記</h2>
                <div class="item-list-wrapper">
                    
                    <details class="tree-node">
                        <summary>2026年</summary>
                        <div class="tree-content">
                            
                            <details class="tree-node">
                                <summary>06月</summary>
                                <div class="tree-content">
                                    <div class="clickable-link" onclick="showDetail('diary', 'diary/2026/06/29')">0629</div>
                                    <div class="clickable-link" onclick="showDetail('diary', 'diary/2026/06/30')">0630</div>
                                </div>
                            </details>

                        </div>
                    </details>
                    
                </div>
            </div>

            <div id="diary-detail" class="detail-view">
                <div class="back-button" onclick="hideDetail('diary')">日記一覧に戻る</div>
                <div id="diary-title-area" class="detail-title"></div>
                <div id="diary-body-area" class="detail-content-text"></div>
            </div>
        </section>

        <section id="miscellany" class="content-section">
            <div id="miscellany-list">
                <h2>雑記帳</h2>
                <div class="item-list-wrapper">
                    
                    <details class="tree-node">
                        <summary>数学</summary>
                        <div class="tree-content">
                            
                            <details class="tree-node">
                                <summary>幾何解析</summary>
                                <div class="tree-content">
                                    
                                    <details class="tree-node">
                                        <summary>測度距離空間</summary>
                                        <div class="tree-content">
                                            <div class="clickable-link" onclick="showDetail('miscellany', 'misc/数学/幾何解析/測度距離空間/測度距離空間のモジュライの位相')">測度距離空間のモジュライの位相</div>
                                        </div>
                                    </details>
                                    
                                </div>
                            </details>

                        </div>
                    </details>
                    
                </div>
            </div>

            <div id="miscellany-detail" class="detail-view">
                <div class="back-button" onclick="hideDetail('miscellany')">雑記帳に戻る</div>
                <div id="miscellany-title-area" class="detail-title"></div>
                <div id="miscellany-body-area" class="detail-content-text"></div>
            </div>
        </section>

        <section id="contact" class="content-section">
            <h2>窓口</h2>
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="name">お名前</label>
                    <input type="text" id="name" name="name">
                </div>
                <div class="form-group">
                    <label for="email">メールアドレス（任意）</label>
                    <input type="text" id="email" name="email">
                </div>
                <div class="form-group">
                    <label for="message">メッセージ</label>
                    <textarea id="message" name="message" rows="5"></textarea>
                </div>
                <button type="submit" class="submit-btn">送信する</button>
                <div class="contact-disclaimer">
                    ※こちらのお問い合わせは形骸的なものであり、私にも届きません。お問い合わせたい心のうちがあれば、なんでもどうぞ。
                </div>
            </form>
        </section>

    </div>

    <script>
        function switchSection(sectionId) {
            const sections = document.querySelectorAll('.content-section');
            sections.forEach(sec => { sec.classList.remove('active'); });
            const activeSection = document.getElementById(sectionId);
            if (activeSection) {
                activeSection.classList.add('active');
                window.location.hash = sectionId;
                activeSection.scrollTop = 0; 
                if(sectionId === 'diary' || sectionId === 'miscellany') hideDetail(sectionId);
            }
        }

        function showDetail(type, fileUrl) {
            const listArea = document.getElementById(type + '-list');
            const detailArea = document.getElementById(type + '-detail');
            const titleArea = document.getElementById(type + '-title-area');
            const bodyArea = document.getElementById(type + '-body-area');

            let extractedTitle = fileUrl.substring(fileUrl.lastIndexOf('/') + 1);
            if (extractedTitle.endsWith('.html')) {
                extractedTitle = extractedTitle.replace('.html', '');
            }
            
            // 🆕 日記のパス（例: diary/2026/06/29）から全体の階層を抜き出して綺麗な日付タイトルを自動生成
            if (type === 'diary') {
                const parts = fileUrl.split('/');
                // parts は ["diary", "2026", "06", "29"] になるので、後ろから3つを結合
                if (parts.length >= 4) {
                    extractedTitle = parts[parts.length - 3] + "." + parts[parts.length - 2] + "." + parts[parts.length - 1];
                }
            }

            fetch(fileUrl)
                .then(response => {
                    if (!response.ok) { throw new Error('Network error'); }
                    return response.text();
                })
                .then(htmlContent => {
                    titleArea.innerText = extractedTitle; 
                    bodyArea.innerHTML = htmlContent;

                    if (window.renderMathInElement) {
                        window.renderMathInElement(bodyArea, {
                            delimiters: [
                                {left: '$$', right: '$$', display: true},
                                {left: '$', right: '$', display: false}
                            ],
                            throwOnError: false
                        });
                    }

                    listArea.style.display = 'none';
                    detailArea.classList.add('active');
                    document.getElementById(type).scrollTop = 0;
                })
                .catch(error => {
                    titleArea.innerText = "読み込みエラー";
                    bodyArea.innerHTML = "存在しない架空の記事です．";
                    listArea.style.display = 'none';
                    detailArea.classList.add('active');
                });
        }

        function hideDetail(type) {
            const listArea = document.getElementById(type + '-list');
            const detailArea = document.getElementById(type + '-detail');

            if(detailArea) detailArea.classList.remove('active');
            if(listArea) listArea.style.display = 'block';
            
            const secContainer = document.getElementById(type);
            if(secContainer) secContainer.scrollTop = 0;
        }

        function toggleMusic() {
            const audio = document.getElementById('bgm');
            const btn = document.getElementById('musicBtn');
            const wrapper = document.getElementById('musicWrapper');
            if (audio.paused) {
                audio.play().catch(e => { console.log("Audio blocked."); });
                btn.classList.add('playing');
                wrapper.classList.add('playing');
            } else {
                audio.pause();
                btn.classList.remove('playing');
                wrapper.classList.remove('playing');
            }
        }
        
        window.addEventListener('DOMContentLoaded', () => {
            const hash = window.location.hash.replace('#', '');
            if (hash && document.getElementById(hash)) {
                switchSection(hash);
            } else {
                switchSection('home');
            }
        });
    </script>

</body>
</html>
