<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>空港分室</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        /* 全体の設定と背景画像 */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Shippori Mincho', serif;
            background-image: url('background.png'); 
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* ----------------------------------
         * 天井から吊り下げられた3つのタブ（横並び）
         * ---------------------------------- */
        .ceiling-nav {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 50px; 
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            cursor: pointer;
        }

        .nav-item::before {
            content: "";
            width: 1px;
            height: 60px; 
            /* ワイヤーも少し紫と光に馴染むように調整 */
            background: linear-gradient(to bottom, rgba(255,255,255,0.3), rgba(150,0,255,0.5));
        }

        /* 磨りガラスデザイン：彩度の高い紫色トーン */
        .nav-box {
            /* ぼかしテクスチャはそのままに、透明度のある鮮やかな紫に */
            background: rgba(140, 0, 255, 0.28); 
            border: 1px solid rgba(200, 100, 255, 0.5); 
            border-top: 2px solid rgba(220, 150, 255, 0.7);
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 20px 40px rgba(110, 0, 255, 0.15), 
                        inset 0 0 15px rgba(255, 255, 255, 0.2);
            padding: 30px 18px; 
            width: 54px; 
            text-align: center;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* タブ内の日本語：彩度高めの水色（明朝体） */
        .nav-box span {
            writing-mode: vertical-rl;
            text-combine-upright: digits 2;
            font-family: 'Shippori Mincho', serif;
            font-weight: 700;
            font-size: 1.4rem;
            /*
