<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>空港分室</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Shippori Mincho', serif;
            /* 【編集】背景画像のファイル名。もしjpgなら「background.jpg」に変える */
            background-image: url('background.png'); 
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .ceiling-nav {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 50px; 
            z-index: 9999;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            cursor: pointer;
        }

        .nav-item::before {
            content: "";
            width: 1px;
            height: 60px; 
            background: linear-gradient(to bottom, rgba(255,255,255,0.3), rgba(150,0,255,0.5));
        }

        .nav-box {
            background: rgba(140, 0, 255, 0.28) !important; 
            border: 1px solid rgba(200, 100, 255, 0.5) !important; 
            border-top: 2px solid rgba(220, 150, 255, 0.7) !important;
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 20px 40px rgba(110, 0, 255, 0.15), inset 0 0 15px rgba(255, 255, 255, 0.2);
            padding: 30px 18px; 
            width: 54px; 
            text-align: center;
            display: block;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .nav-box span {
            writing-mode: vertical-rl;
            text-combine-upright: digits 2;
            font-family: 'Shippori Mincho', serif;
            font-weight: 700;
            font-size: 1.4rem;
            color: #00f0ff; 
            letter-spacing: 0.3em;
            text-shadow: 0 0 8px rgba(0, 240, 255, 0.6), 0 1px 2px rgba(0, 0, 0, 0.3);
            line-height: 1;
            display: inline-block;
        }

        .nav-item:hover .nav-box {
            background: rgba(150, 0, 255, 0.45) !important;
            border: 1px solid rgba(220, 100, 255, 0.8) !important;
            transform: translateY(6px); 
            box-shadow: 0 15px 30px rgba(110, 0, 255, 0.3);
        }
